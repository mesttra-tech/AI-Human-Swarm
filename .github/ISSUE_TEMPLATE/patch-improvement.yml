name: Patch improvement
description: Suggest a safer command, clearer remediation step, or better source for an existing patch.
title: "[Patch improvement]: "
labels:
  - patch-improvement
body:
  - type: markdown
    attributes:
      value: |
        Suggest defensive improvements only. Do not paste secrets, private logs, customer data, internal URLs, exploit payloads, or unsafe copy/paste commands.
  - type: input
    id: patch
    attributes:
      label: Patch or file
      description: Which daily patch, template, or skill section should change?
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
      description: Explain the safer wording, command, source, or verification step.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Public sources
      description: Add public links or citations when the suggestion depends on a current threat or advisory.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, private data, exploit payloads, or instructions to exfiltrate data.
          required: true
