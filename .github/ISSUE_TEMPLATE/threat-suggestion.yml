name: Threat suggestion
description: Suggest a public threat, source, or defensive topic for a daily cyber patch.
title: "[Threat]: "
labels:
  - threat-suggestion
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a defensive topic. Do not paste secrets, private logs, customer data, internal URLs, exploit payloads, or instructions that exfiltrate data.
  - type: input
    id: threat
    attributes:
      label: Threat or topic
      description: Name the threat, ecosystem, CVE, package, tool, or defensive topic.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Public sources
      description: Add public links or citations that maintainers can verify.
    validations:
      required: true
  - type: textarea
    id: defensive-value
    attributes:
      label: Defensive value
      description: Explain what defenders can detect, patch, verify, or harden.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, private data, exploit payloads, or instructions to exfiltrate data.
          required: true
